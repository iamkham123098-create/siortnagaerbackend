databases:
  - name: siortnagardb
    plan: free
    databaseName: siortnagardb
    user: siortnagaruser

services:
  - type: web
    name: siortnagarbackend
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn siortnagarbackend.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: siortnagardb
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHON_VERSION
        value: "3.11.4"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
